<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIXTHLAYER Vision Core Terminal</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        #terminal {
            flex: 1;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-bottom: 2rem;
        }

        #drop-zone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 50, 0, 0.4);
            border: 4px dashed #0f0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f0;
            font-size: 2rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        body.dragover #drop-zone {
            opacity: 1;
            pointer-events: auto;
        }

        .line { margin-bottom: 4px; }
        .blinking-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #0f0;
            animation: blink 1s step-end infinite;
            vertical-align: bottom;
        }

        @keyframes blink { 50% { opacity: 0; } }
        
        button#login-btn, button#connect-btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            width: fit-content;
            margin-top: 10px;
        }

        button#connect-btn {
            display: none;
        }
    </style>
</head>
<body>
    <div id="drop-zone">DROP IMAGE TO ESTABLISH NEURAL LINK</div>
    <div id="terminal">
        <div class="line">SIXTHLAYER VISION CORE [Version 1.0.0]</div>
        <div class="line">(c) Root Access Granted.</div>
        <div class="line" id="status-line">System initializing...</div>
        <button id="connect-btn">CONNECT ESP8266 HUD</button>
    </div>
    <div id="cursor-wrapper"><span class="blinking-cursor"></span></div>

    <script>
        const terminal = document.getElementById('terminal');
        const statusLine = document.getElementById('status-line');
        const connectBtn = document.getElementById('connect-btn');
        let port, writer;

        connectBtn.addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                const textEncoder = new TextEncoderStream();
                textEncoder.readable.pipeTo(port.writable);
                writer = textEncoder.writable.getWriter();
                
                printLine(`[OK] Hardware Uplink Established (115200 baud).`);
                connectBtn.style.display = 'none';
                writer.write("V-CORE SYNCED. STANDBY.\\n");
            } catch (err) {
                printLine(`[!] Hardware Sync Failed: ${err.message}`, "#f00");
            }
        });

        const PROMPT = `You are the vision module for a tactical AR HUD, but you act like a human tactical partner analyzing my video feed.
Tell me what I'm looking at in a natural, conversational way—like you are texting me.
Do Not restrict yourself to just one or two words; give me a couple of short sentences.
Focus on the most interesting, relevant, or dangerous objects/text in the frame. Avoid obvious everyday stuff.
Do not use formatting, category tags, or markdown. Just give me the raw text message.`;

        function printLine(text, color = "#0f0") {
            const div = document.createElement('div');
            div.className = 'line';
            div.style.color = color;
            div.textContent = text;
            terminal.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        async function init() {
            try {
                // Wait for puter
                while (!window.puter || !puter.auth) {
                    await new Promise(r => setTimeout(r, 100));
                }
                
                if (!puter.auth.isSignedIn()) {
                    statusLine.textContent = "AUTH REQUIRED. Waiting for token...";
                    const btn = document.createElement('button');
                    btn.id = 'login-btn';
                    btn.textContent = "LOGIN VIA PUTER";
                    btn.onclick = async () => {
                        await puter.auth.signIn();
                        btn.remove();
                        startTerminal();
                    };
                    terminal.appendChild(btn);
                } else {
                    startTerminal();
                }
            } catch(e) {
                printLine(`[ERROR] INIT FAILED: ${e.message}`, "#f00");
            }
        }

        function startTerminal() {
            statusLine.textContent = `[OK] NEURAL LINK ACTIVE.`;
            if ('serial' in navigator) {
                connectBtn.style.display = 'block';
                printLine(`Awaiting Hardware Uplink. Click 'CONNECT ESP8266 HUD' to bridge...`);
            } else {
                printLine(`[!] Web Serial not supported in this browser. Hardware Uplink unavailable.`, "#f00");
            }
            printLine(`Drop visual data anywhere to process.`);
        }

        async function processImage(file) {
            printLine(`\n> Analyzing visual data payload: ${file.name}...`);
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const dataUrl = e.target.result;
                try {
                    const payload = [{
                        role: 'user', 
                        content: [
                            { type: 'text', text: PROMPT }, 
                            { type: 'image_url', image_url: { url: dataUrl } }
                        ]
                    }];
                    
                    const response = await puter.ai.chat(payload);
                    let result = response.message.content.trim();
                    
                    printLine(`\n> ${result}\n`);
                    
                    if (writer) {
                        try {
                            let safeResult = result.replace(/\\n/g, ' ') + '\\n';
                            await writer.write(safeResult);
                        } catch (e) {
                            printLine(`[!] Failed to transmit to HUD: ${e.message}`, "#f00");
                        }
                    }
                    
                } catch(err) {
                    printLine(`[!] V-CORE SYSTEM FAILURE: ${err.message}`, "#f00");
                }
            };
            reader.readAsDataURL(file);
        }

        // Drag and Drop Logic
        document.body.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('dragover');
        });

        document.body.addEventListener('dragleave', (e) => {
            e.preventDefault();
            if (e.target.id === 'drop-zone') {
                document.body.classList.remove('dragover');
            }
        });

        document.body.addEventListener('drop', (e) => {
            e.preventDefault();
            document.body.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processImage(file);
            } else {
                printLine(`[ERROR] Invalid file type. Must be an image.`, "#f00");
            }
        });

        init();
    </script>
</body>
</html>
